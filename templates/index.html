<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threads AutoPost Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
    {% raw %}
        const { useState, useEffect } = React;

        // SVG Icons
        const Settings = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const Edit3 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>;
        const Calendar = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const XCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
        const RefreshCw = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const LogOut = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>;
        const User = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
        const BarChart2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>;
        const MessageCircle = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>;
        const Eye = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const Heart = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>;
        const Save = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const Upload = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const Sparkles = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 3l1.912 5.813a2 2 0 001.275 1.275L21 12l-5.813 1.912a2 2 0 00-1.275 1.275L12 21l-1.912-5.813a2 2 0 00-1.275-1.275L3 12l5.813-1.912a2 2 0 001.275-1.275L12 3z"></path></svg>;
        const Send = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;

        const Spinner = ({className}) => (
            <svg className={`animate-spin ${className}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('create');
            const [credentials, setCredentials] = useState({ token: '', userId: '', baseUrl: '', pictSpaceUrl: '', pixivUrl: '' });
            const [posts, setPosts] = useState([]);
            const [logs, setLogs] = useState([]);
            const [isFetchingUser, setIsFetchingUser] = useState(false);
            const [isUploading, setIsUploading] = useState(false);
            const [isUpdatingInsights, setIsUpdatingInsights] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [newPost, setNewPost] = useState({ text: '', scheduledAt: '' });
            const [selectedImages, setSelectedImages] = useState([]);
            const [generatePrompt, setGeneratePrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [chatMessages, setChatMessages] = useState([
                { role: 'system', content: 'あなたはThreads運用とPictSpace・Pixivの集客に特化したアドバイザーです。' },
                { role: 'assistant', content: '運用について何でも聞いてください！' }
            ]);
            const [chatInput, setChatInput] = useState('');
            const [isChatting, setIsChatting] = useState(false);
            const [consoleHeight, setConsoleHeight] = useState(160);
            const [isDraggingConsole, setIsDraggingConsole] = useState(false);

            const apiCall = (path) => path.startsWith('./') ? path : `./${path.startsWith('/') ? path.slice(1) : path}`;
            const addLog = (message, type = 'info') => {
                const time = new Date().toLocaleTimeString();
                setLogs(prev => [{ time, message, type }, ...prev].slice(0, 50));
            };

            const loadData = async () => {
                try {
                    const [settingsRes, postsRes] = await Promise.all([
                        fetch(apiCall('api/settings')).then(r => r.json()),
                        fetch(apiCall('api/posts')).then(r => r.json())
                    ]);
                    if (!settingsRes.error) setCredentials(prev => prev.token === '' ? settingsRes : prev);
                    if (!postsRes.error) setPosts(postsRes.length ? postsRes : []);
                } catch (e) { console.error(e); }
            };

            useEffect(() => {
                loadData();
                const interval = setInterval(loadData, 5000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isDraggingConsole) return;
                    const newHeight = window.innerHeight - e.clientY;
                    setConsoleHeight(Math.max(50, Math.min(newHeight, window.innerHeight * 0.8)));
                };
                const handleMouseUp = () => setIsDraggingConsole(false);
                if (isDraggingConsole) {
                    document.addEventListener('mousemove', handleMouseMove);
                    document.addEventListener('mouseup', handleMouseUp);
                }
                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, [isDraggingConsole]);

            const fetchUserId = async () => {
                setIsFetchingUser(true);
                addLog('ユーザーID取得中...');
                try {
                    const res = await fetch(apiCall('api/fetch_user'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: credentials.token })
                    });
                    const data = await res.json();
                    if (data.id) {
                        setCredentials(prev => ({ ...prev, userId: data.id }));
                        addLog('取得成功', 'success');
                    }
                } catch (e) { addLog('失敗', 'error'); }
                setIsFetchingUser(false);
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                setIsUploading(true);
                for (const file of files) {
                    const formData = new FormData();
                    formData.append('file', file);
                    try {
                        const res = await fetch(apiCall('api/upload'), { method: 'POST', body: formData });
                        const data = await res.json();
                        if (data.url) setSelectedImages(prev => [...prev, data.url]);
                    } catch (e) { addLog('アップロード失敗', 'error'); }
                }
                setIsUploading(false);
            };

            const handleSavePost = async (isImmediate = false) => {
                if (!newPost.text) return;
                setIsSubmitting(true);
                try {
                    await fetch(apiCall('api/posts'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: newPost.text,
                            imageUrl: selectedImages.join(','),
                            scheduledAt: newPost.scheduledAt || new Date().toISOString().slice(0, 16),
                            postNow: isImmediate
                        })
                    });
                    addLog('保存完了', 'success');
                    setNewPost({ text: '', scheduledAt: '' });
                    setSelectedImages([]);
                    setActiveTab('schedule');
                    loadData();
                } catch (e) { addLog('エラー', 'error'); }
                setIsSubmitting(false);
            };

            const handleUpdateInsights = async () => {
                setIsUpdatingInsights(true);
                addLog('インサイト更新中...');
                try {
                    await fetch(apiCall('api/insights/update'), { method: 'POST' });
                    await loadData();
                    addLog('更新完了', 'success');
                } catch (e) { addLog('更新失敗', 'error'); }
                setIsUpdatingInsights(false);
            };

            const handleGenerateText = async () => {
                setIsGenerating(true);
                addLog('AI生成中...');
                try {
                    const res = await fetch(apiCall('api/ai/generate'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: generatePrompt })
                    });
                    const data = await res.json();
                    if (data.text) {
                        setNewPost(prev => ({ ...prev, text: data.text }));
                        addLog('生成完了', 'success');
                    }
                } catch (e) { addLog('生成失敗', 'error'); }
                setIsGenerating(false);
            };

            const handleSendChatMessage = async (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;
                const newMessages = [...chatMessages, { role: 'user', content: chatInput }];
                setChatMessages(newMessages);
                setChatInput('');
                setIsChatting(true);
                try {
                    const res = await fetch(apiCall('api/ai/chat'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: newMessages })
                    });
                    const data = await res.json();
                    setChatMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
                } catch (e) { addLog('チャットエラー', 'error'); }
                setIsChatting(false);
            };

            const renderTabContent = () => {
                switch (activeTab) {
                    case 'create': return (
                        <div className="space-y-6 animate-fadeIn">
                            <h2 className="text-xl font-bold flex items-center"><Edit3 className="mr-2" /> 新規投稿作成</h2>
                            <div className="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                                <label className="block text-sm font-bold text-indigo-800 mb-2 flex items-center"><Sparkles className="w-4 h-4 mr-1" /> AI宣伝文生成</label>
                                <div className="flex gap-2">
                                    <input type="text" value={generatePrompt} onChange={e => setGeneratePrompt(e.target.value)} placeholder="例: 夏の新作イラスト" className="flex-1 p-2 border rounded text-sm" />
                                    <button onClick={handleGenerateText} disabled={isGenerating} className="bg-indigo-600 text-white px-4 py-2 rounded text-sm font-bold">生成</button>
                                </div>
                            </div>
                            <textarea value={newPost.text} onChange={e => setNewPost({...newPost, text: e.target.value})} rows="5" className="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500" placeholder="投稿内容..." />
                            <div className="grid grid-cols-5 gap-2">
                                {selectedImages.map((url, i) => (
                                    <div key={i} className="relative aspect-square rounded overflow-hidden group">
                                        <img src={url} className="w-full h-full object-cover" />
                                        <button onClick={()=>setSelectedImages(selectedImages.filter((_, idx)=>idx!==i))} className="absolute top-0 right-0 bg-red-500 text-white p-1 opacity-0 group-hover:opacity-100 transition"><XCircle className="w-4 h-4"/></button>
                                    </div>
                                ))}
                                {selectedImages.length < 10 && (
                                    <label className="aspect-square border-2 border-dashed rounded flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50">
                                        <Upload className="text-gray-400" />
                                        <input type="file" multiple className="hidden" onChange={handleFileUpload} />
                                    </label>
                                )}
                            </div>
                            <input type="datetime-local" value={newPost.scheduledAt} onChange={e => setNewPost({...newPost, scheduledAt: e.target.value})} className="w-full p-2 border rounded" />
                            <div className="flex gap-3">
                                <button onClick={() => handleSavePost(false)} disabled={isSubmitting} className="flex-1 py-3 bg-blue-600 text-white rounded font-bold flex justify-center items-center">
                                    {isSubmitting && <Spinner className="w-5 h-5 mr-2" />} スケジュール登録
                                </button>
                                <button onClick={() => handleSavePost(true)} disabled={isSubmitting} className="flex-1 py-3 bg-gray-800 text-white rounded font-bold flex justify-center items-center">
                                    {isSubmitting && <Spinner className="w-5 h-5 mr-2" />} 今すぐ投稿
                                </button>
                            </div>
                        </div>
                    );
                    case 'schedule': return (
                        <div className="space-y-4 animate-fadeIn">
                            <div className="flex justify-between items-center">
                                <h2 className="text-xl font-bold flex items-center"><Calendar className="mr-2" /> 投稿管理</h2>
                                <button onClick={handleUpdateInsights} disabled={isUpdatingInsights} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center">
                                    <RefreshCw className={`w-3 h-3 mr-1 ${isUpdatingInsights?'animate-spin':''}`}/> 同期
                                </button>
                            </div>
                            <div className="bg-white border rounded-lg overflow-hidden">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-50 border-b">
                                        <tr><th className="p-3 text-left">日時</th><th className="p-3 text-left">内容</th><th className="p-3 text-center">状態</th><th className="p-3 text-center">操作</th></tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {posts.map(p => (
                                            <tr key={p.id} className="hover:bg-gray-50">
                                                <td className="p-3 whitespace-nowrap text-xs">{p.scheduledAt?.replace('T',' ')}</td>
                                                <td className="p-3 truncate max-w-[200px]">{p.text}</td>
                                                <td className="p-3 text-center">
                                                    <span className={`px-2 py-1 rounded text-[10px] font-bold ${p.status==='Published'?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700'}`}>{p.status}</span>
                                                </td>
                                                <td className="p-3 text-center">
                                                    {p.status !== 'Published' && <button onClick={()=>apiCall(`api/posts/${p.id}/execute`)} className="bg-gray-800 text-white text-[10px] px-2 py-1 rounded">即投稿</button>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    );
                    case 'dashboard':
                        const stats = posts.filter(p => p.status === 'Published').reduce((acc, curr) => {
                            acc.v += curr.views || 0; acc.l += curr.likes || 0; acc.r += curr.replies || 0; return acc;
                        }, { v: 0, l: 0, r: 0 });
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <h2 className="text-xl font-bold flex items-center"><BarChart2 className="mr-2" /> インサイト</h2>
                                <div className="grid grid-cols-3 gap-4">
                                    <div className="bg-white border rounded-xl p-4 shadow-sm text-center">
                                        <div className="flex items-center justify-center text-gray-500 text-[10px] mb-1"><Eye className="w-3 h-3 mr-1 text-blue-500"/> 閲覧</div>
                                        <div className="text-xl font-black">{stats.v.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-white border rounded-xl p-4 shadow-sm text-center">
                                        <div className="flex items-center justify-center text-gray-500 text-[10px] mb-1"><Heart className="w-3 h-3 mr-1 text-red-500"/> いいね</div>
                                        <div className="text-xl font-black">{stats.l.toLocaleString()}</div>
                                    </div>
                                    <div className="bg-white border rounded-xl p-4 shadow-sm text-center">
                                        <div className="flex items-center justify-center text-gray-500 text-[10px] mb-1"><MessageCircle className="w-3 h-3 mr-1 text-green-500"/> 返信</div>
                                        <div className="text-xl font-black">{stats.r.toLocaleString()}</div>
                                    </div>
                                </div>
                                <div className="bg-white border rounded-xl overflow-hidden shadow-sm">
                                    <table className="w-full text-xs">
                                        <thead className="bg-gray-50 border-b"><tr><th className="p-3 text-left">内容</th><th className="p-3 text-center">閲覧</th><th className="p-3 text-center">いいね</th></tr></thead>
                                        <tbody className="divide-y">
                                            {posts.filter(p=>p.status==='Published').map(p=>(
                                                <tr key={p.id}><td className="p-3 truncate max-w-[150px]">{p.text}</td><td className="p-3 text-center text-blue-600 font-bold">{p.views||0}</td><td className="p-3 text-center text-red-600 font-bold">{p.likes||0}</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        );
                    case 'ai_assistant': return (
                        <div className="space-y-4 animate-fadeIn flex flex-col h-[450px]">
                            <h2 className="text-xl font-bold flex items-center"><MessageCircle className="mr-2 text-indigo-600" /> AIアシスタント</h2>
                            <div className="flex-1 bg-gray-50 border rounded-lg p-3 overflow-y-auto space-y-3">
                                {chatMessages.filter(m=>m.role!=='system').map((m,i)=>(
                                    <div key={i} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                                        <div className={`max-w-[85%] p-3 rounded-lg text-xs ${m.role==='user'?'bg-indigo-600 text-white':'bg-white border shadow-sm'}`}>{m.content}</div>
                                    </div>
                                ))}
                            </div>
                            <form onSubmit={handleSendChatMessage} className="flex gap-2">
                                <input type="text" value={chatInput} onChange={e=>setChatInput(e.target.value)} className="flex-1 p-2 border rounded" placeholder="質問を入力..." />
                                <button type="submit" className="bg-indigo-600 text-white p-2 rounded"><Send className="w-5 h-5"/></button>
                            </form>
                        </div>
                    );
                    case 'settings': return (
                        <div className="space-y-6 animate-fadeIn">
                            <h2 className="text-xl font-bold flex items-center"><Settings className="mr-2" /> API設定</h2>
                            <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 space-y-4">
                                <input type="password" value={credentials.token} onChange={e => setCredentials({...credentials, token: e.target.value})} placeholder="TOKEN" className="w-full p-2 border rounded" />
                                <div className="flex gap-2">
                                    <input type="text" value={credentials.userId} onChange={e => setCredentials({...credentials, userId: e.target.value})} placeholder="USER ID" className="flex-1 p-2 border rounded" />
                                    <button onClick={fetchUserId} disabled={isFetchingUser} className="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold">取得</button>
                                </div>
                                <input type="url" value={credentials.pictSpaceUrl} onChange={e => setCredentials({...credentials, pictSpaceUrl: e.target.value})} placeholder="PictSpace URL" className="w-full p-2 border rounded" />
                                <input type="url" value={credentials.pixivUrl} onChange={e => setCredentials({...credentials, pixivUrl: e.target.value})} placeholder="Pixiv URL" className="w-full p-2 border rounded" />
                                <button onClick={() => {
                                    fetch(apiCall('api/settings'), {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(credentials)});
                                    addLog('保存しました', 'success');
                                }} className="w-full py-3 bg-gray-800 text-white rounded font-bold">設定を保存</button>
                            </div>
                        </div>
                    );
                    default: return null;
                }
            };

            return (
                <div className="flex flex-col md:flex-row h-screen bg-gray-100 overflow-hidden text-sm">
                    <div className="w-full md:w-64 bg-white border-b md:border-r flex flex-col shrink-0 z-20">
                        <div className="p-4 border-b font-black text-lg text-gray-800">Threads <span className="text-blue-600">AutoPost</span></div>
                        <nav className="flex md:flex-col overflow-x-auto p-2 gap-1 flex-1 scrollbar-hide">
                            {[{id:'create', label:'作成', icon:Edit3}, {id:'schedule', label:'管理', icon:Calendar}, {id:'dashboard', label:'分析', icon:BarChart2}, {id:'ai_assistant', label:'AI相談', icon:MessageCircle}, {id:'settings', label:'設定', icon:Settings}].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex items-center px-4 py-3 rounded-lg flex-shrink-0 transition-all ${activeTab === t.id ? 'bg-blue-50 text-blue-700 font-bold' : 'text-gray-500'}`}>
                                    <t.icon className="w-5 h-5 mr-3" /> <span>{t.label}</span>
                                </button>
                            ))}
                            <div className="md:mt-auto"><a href="/logout" className="flex items-center px-4 py-3 text-red-500 font-bold"><LogOut className="w-5 h-5 mr-3" /> ログアウト</a></div>
                        </nav>
                    </div>
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        <main className="flex-1 overflow-y-auto p-4 md:p-8">
                            <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-sm border p-4 md:p-8 min-h-[500px] mb-8">{renderTabContent()}</div>
                        </main>
                        <div style={{ height: `${consoleHeight}px` }} className="bg-gray-900 text-gray-100 font-mono text-[10px] md:text-xs flex flex-col shrink-0 relative transition-none">
                            <div className="absolute top-0 left-0 right-0 h-4 -mt-2 cursor-ns-resize flex items-center justify-center group z-30" onMouseDown={() => setIsDraggingConsole(true)}>
                                <div className="w-12 h-1.5 bg-gray-500 rounded-full group-hover:bg-blue-500 transition-colors"></div>
                            </div>
                            <div className="p-3 overflow-y-auto flex-1">
                                <div className="flex justify-between text-gray-400 font-bold mb-2"><span>SYSTEM CONSOLE</span><button onClick={() => setLogs([])}>CLEAR</button></div>
                                {logs.map((log, i) => (<div key={i} className="flex gap-2"><span>[{log.time}]</span><span className={log.type==='error'?'text-red-400':log.type==='success'?'text-green-400':'text-blue-300'}>{log.message}</span></div>))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    {% endraw %}
    </script>
</body>
</html>
